<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LDC Test Series - Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #1e5a9c;
      --primary-dark: #0f2b4d;
      --accent: #4f46e5;
      --success: #15803d;
      --danger: #dc2626;
      --bg: #eef2ff;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --hover: #f1f5f9;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 50%, #f0f4ff 100%);
      min-height: 100vh;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* ========== HEADER ========== */
    .app-header {
      background: linear-gradient(135deg, #0f2b4d, #1a4a7a);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 3px solid rgba(255,255,255,0.1);
    }
    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .logo h2 {
      font-size: 1.4rem;
      color: white;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo h2 span.emoji {
      font-size: 1.6rem;
    }
    .logo span {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .user-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      backdrop-filter: blur(10px);
    }
    .user-icon:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    /* ========== CONTAINER ========== */
    .home-container {
      max-width: 680px;
      margin: 24px auto;
      padding: 0 16px;
    }

    /* ========== WELCOME CARD ========== */
    .welcome-card {
      background: white;
      border-radius: 24px;
      padding: 24px 24px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .welcome-card::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, rgba(30,90,156,0.08), rgba(79,70,229,0.08));
      border-radius: 50%;
    }
    .welcome-card h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 4px;
      position: relative;
    }
    .welcome-card p {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      position: relative;
    }

    /* ========== SECTION TITLE ========== */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 28px 0 14px;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    .section-title span:first-child {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .count-badge {
      font-size: 0.7rem;
      font-weight: 700;
      background: white;
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 20px;
      box-shadow: var(--shadow-sm);
    }

    /* ========== QUIZ LIST ========== */
    .quiz-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .quiz-item {
      background: white;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: var(--shadow-sm);
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .quiz-item:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .quiz-item:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-sm);
    }
    .quiz-info {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }
    .quiz-badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .badge-p1 {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1e40af;
    }
    .badge-p2 {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #166534;
    }
    .quiz-details {
      min-width: 0;
    }
    .quiz-details h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quiz-details p {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .quiz-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .completed-icon {
      font-size: 1.1rem;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .delete-btn {
      background: rgba(239,68,68,0.08);
      border: 2px solid transparent;
      color: #94a3b8;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    .delete-btn:hover {
      color: var(--danger);
      background: rgba(239,68,68,0.12);
      border-color: rgba(239,68,68,0.3);
    }

    .empty-state {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      border: 2px dashed var(--border);
    }

    /* ========== MODAL ========== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 28px 24px;
      width: 92%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
      background: #fafbfc;
      color: var(--text-main);
    }
    .input-group input:focus,
    .input-group select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(30,90,156,0.1);
      background: white;
    }
    .input-group input::placeholder {
      color: #cbd5e1;
    }
    .btn {
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 12px rgba(30,90,156,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(30,90,156,0.4);
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-secondary {
      background: #f1f5f9;
      color: var(--text-muted);
      border: 2px solid var(--border);
    }
    .btn-secondary:hover {
      background: #e2e8f0;
      color: var(--text-main);
    }
    .error-msg {
      color: var(--danger);
      font-size: 0.75rem;
      margin-top: 6px;
      display: none;
      font-weight: 600;
      animation: fadeIn 0.2s ease;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 480px) {
      .app-header {
        padding: 12px 16px;
      }
      .logo h2 {
        font-size: 1.1rem;
      }
      .home-container {
        padding: 0 12px;
        margin: 16px auto;
      }
      .quiz-item {
        padding: 12px 14px;
      }
      .quiz-badge {
        width: 38px;
        height: 38px;
        font-size: 0.75rem;
      }
      .modal-card {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <h2><span class="emoji">📚</span> LDC Test Series</h2>
    <span>राजस्थान कर्मचारी चयन बोर्ड</span>
  </div>
  <div class="user-icon" onclick="openLoginModal()" title="एडमिन लॉगिन">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
  </div>
</header>

<div class="home-container">
  <div class="welcome-card">
    <h3>👋 नमस्ते, अभ्यर्थी!</h3>
    <p>अपनी तैयारी को परखने के लिए पेपर चुनें।</p>
  </div>

  <div class="section-title">
    <span>📄 पेपर 1 <span style="font-weight:400;color:var(--text-muted);">(GK & Science)</span></span>
    <span class="count-badge" id="paper1Count">0</span>
  </div>
  <div id="paper1Quizzes" class="quiz-list"></div>

  <div class="section-title" style="margin-top: 24px;">
    <span>📑 पेपर 2 <span style="font-weight:400;color:var(--text-muted);">(Hindi & English)</span></span>
    <span class="count-badge" id="paper2Count">0</span>
  </div>
  <div id="paper2Quizzes" class="quiz-list"></div>
</div>

<!-- LOGIN / ADD QUIZ MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-card">
    <h3 id="modalTitle">🔐 एडमिन लॉगिन</h3>
    
    <div id="loginSection">
      <div class="input-group">
        <label>सुरक्षा पिन (PIN)</label>
        <input type="password" id="pinInput" placeholder="4 अंकों का पिन दर्ज करें" maxlength="4" inputmode="numeric">
        <div class="error-msg" id="pinError">❌ गलत पिन! कृपया पुनः प्रयास करें।</div>
      </div>
    </div>

    <div id="addQuizForm" style="display: none;">
      <div class="input-group">
        <label>क्विज़ का नाम</label>
        <input type="text" id="quizNameInput" placeholder="उदाहरण: RPSC Mock Test 05">
      </div>
      <div class="input-group">
        <label>JSON डेटा URL</label>
        <input type="url" id="jsonUrlInput" placeholder="https://api.jsonbin.io/v3/b/...">
      </div>
      <div class="input-group">
        <label>पेपर प्रकार</label>
        <select id="paperTypeSelect">
          <option value="1">📄 पेपर 1 (GK & Science)</option>
          <option value="2">📑 पेपर 2 (Hindi & English)</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary" id="mainActionBtn" onclick="handleMainAction()">लॉगिन</button>
    <button class="btn btn-secondary" onclick="closeLoginModal()">बंद करें</button>
  </div>
</div>

<script>
const ADMIN_PIN = "4885";
const JSONBIN_API_KEY = "$2a$10$XL4iuq0g8lswBdQN2KIhh.QodRh.0QEmO0nxno45VV3DR14ZVmzkK"; 
const JSONBIN_BIN_ID = "69e74371856a6821895808ad";

let quizzes = [];
let completedQuizzes = JSON.parse(localStorage.getItem('completedQuizzes') || '[]');

const defaultQuizzes = [
  { id: 'demo-1', name: 'सिलेबस और रणनीति', paperType: '1', dataUrl: '', isDefault: true },
  { id: 'demo-2', name: 'सामान्य हिन्दी डेमो', paperType: '2', dataUrl: '', isDefault: true }
];

async function loadQuizzes() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    if (res.ok) {
      const data = await res.json();
      const saved = data.record || [];
      quizzes = [...defaultQuizzes, ...saved];
    } else {
      throw new Error("Failed to fetch");
    }
  } catch(e) {
    console.error("Loading error:", e);
    const local = localStorage.getItem('quizzes_backup');
    quizzes = local ? [...defaultQuizzes, ...JSON.parse(local)] : [...defaultQuizzes];
  }
  renderHomePage();
}

async function saveQuizzesOnline() {
  const customOnly = quizzes.filter(q => !q.isDefault);
  localStorage.setItem('quizzes_backup', JSON.stringify(customOnly));
  
  try {
    const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: { 
        'Content-Type': 'application/json', 
        'X-Master-Key': JSONBIN_API_KEY 
      },
      body: JSON.stringify(customOnly)
    });
    return response.ok;
  } catch(e) {
    console.error("Save error:", e);
    return false;
  }
}

function renderHomePage() {
  const p1 = quizzes.filter(q => q.paperType === '1');
  const p2 = quizzes.filter(q => q.paperType === '2');
  
  document.getElementById('paper1Count').textContent = p1.length;
  document.getElementById('paper2Count').textContent = p2.length;
  
  renderList(p1, 'paper1Quizzes');
  renderList(p2, 'paper2Quizzes');
}

function renderList(items, containerId) {
  const container = document.getElementById(containerId);
  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state">📭 अभी तक कोई पेपर उपलब्ध नहीं है।<br><span style="font-size:0.7rem;">एडमिन पैनल से नया टेस्ट जोड़ें।</span></div>';
    return;
  }
  
  container.innerHTML = items.map(q => `
    <div class="quiz-item">
      <div class="quiz-info" onclick="startQuiz('${q.id}')">
        <div class="quiz-badge ${q.paperType === '1' ? 'badge-p1' : 'badge-p2'}">P${q.paperType}</div>
        <div class="quiz-details">
          <h4>${q.name}</h4>
          <p>${q.isDefault ? '📌 महत्वपूर्ण जानकारी' : '📝 लाइव टेस्ट'}</p>
        </div>
      </div>
      <div class="quiz-actions">
        ${completedQuizzes.includes(q.id) ? '<span class="completed-icon" title="पूर्ण हुआ">✅</span>' : ''}
        ${!q.isDefault ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteQuiz('${q.id}')" title="हटाएं">🗑️</button>` : ''}
      </div>
    </div>
  `).join('');
}

function openLoginModal() {
  document.getElementById('loginModal').style.display = 'flex';
  resetModal();
}

function closeLoginModal() {
  document.getElementById('loginModal').style.display = 'none';
}

function resetModal() {
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('addQuizForm').style.display = 'none';
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').style.display = 'none';
  document.getElementById('mainActionBtn').textContent = 'लॉगिन';
  document.getElementById('modalTitle').textContent = '🔐 एडमिन लॉगिन';
}

async function handleMainAction() {
  const loginSection = document.getElementById('loginSection');
  const pinInput = document.getElementById('pinInput').value;

  if (loginSection.style.display !== 'none') {
    if (pinInput === ADMIN_PIN) {
      loginSection.style.display = 'none';
      document.getElementById('addQuizForm').style.display = 'block';
      document.getElementById('mainActionBtn').textContent = '➕ टेस्ट जोड़ें';
      document.getElementById('modalTitle').textContent = '➕ नया टेस्ट जोड़ें';
    } else {
      document.getElementById('pinError').style.display = 'block';
    }
    return;
  }

  const name = document.getElementById('quizNameInput').value.trim();
  const url = document.getElementById('jsonUrlInput').value.trim();
  const type = document.getElementById('paperTypeSelect').value;

  if (!name || !url) {
    alert("⚠️ कृपया क्विज़ का नाम और JSON URL दोनों भरें।");
    return;
  }

  const newQuiz = {
    id: 'q-' + Date.now(),
    name: name,
    paperType: type,
    dataUrl: url,
    isDefault: false
  };

  quizzes.push(newQuiz);
  const success = await saveQuizzesOnline();
  
  if (success) {
    alert("✅ टेस्ट सफलतापूर्वक क्लाउड पर सेव हो गया!");
    closeLoginModal();
    renderHomePage();
  } else {
    alert("❌ क्लाउड सिंक विफल! कृपया इंटरनेट कनेक्शन जांचें।");
  }
}

async function deleteQuiz(id) {
  if (!confirm("⚠️ क्या आप वाकई इस टेस्ट को स्थायी रूप से हटाना चाहते हैं?")) return;
  quizzes = quizzes.filter(q => q.id !== id);
  await saveQuizzesOnline();
  renderHomePage();
}

function startQuiz(id) {
  const quiz = quizzes.find(q => q.id === id);
  if (!quiz) return;
  
  if (quiz.isDefault) {
    alert("ℹ️ यह एक डेमो आइटम है। कृपया लाइव टेस्ट चुनें।");
    return;
  }

  sessionStorage.setItem('currentQuiz', JSON.stringify(quiz));
  window.location.href = 'ldc-quiz.html'; 
}

loadQuizzes();
</script>
</body>
</html>
