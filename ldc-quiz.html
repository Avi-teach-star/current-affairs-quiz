<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LDC Quiz Pro - Live Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #eef2ff;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      padding: 20px 16px;
      color: #0f172a;
    }
    .quiz-container {
      max-width: 950px;
      margin: 0 auto;
    }
    /* Header */
    .quiz-header {
      background: linear-gradient(135deg, #0f2b4d, #1a4a7a);
      color: white;
      border-radius: 28px;
      padding: 18px 18px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .quiz-header h1 {
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .timer {
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      font-weight: 800;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 30px;
      color: white;
    }
    /* progress panel */
    .progress-panel {
      background: white;
      border-radius: 60px;
      padding: 10px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .q-counter {
      background: #e2e8f0;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 700;
    }
    .progress-wrapper {
      flex: 1;
      height: 10px;
      background: #e2e8f0;
      border-radius: 20px;
      overflow: hidden;
      margin: 0 12px;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #1e5a9c;
      transition: width 0.2s ease;
    }
    .answered-badge {
      font-size: 0.85rem;
      font-weight: 600;
      background: #f1f5f9;
      padding: 5px 12px;
      border-radius: 24px;
    }
    /* question card */
    .question-card {
      background: white;
      border-radius: 32px;
      padding: 26px 22px;
      margin-bottom: 20px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.08);
    }
    .question-text {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 20px;
      border-left: 5px solid #1e5a9c;
      padding-left: 18px;
    }
    /* Diagram/Image Styling */
    .diagram-container {
      margin: 15px 0;
      padding: 10px;
      background: #fdfdfd;
      border: 1px solid #eee;
      border-radius: 12px;
      display: inline-block;
      max-width: 100%;
    }
    .diagram-container svg,
    .diagram-container img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .opt-item {
      background: #f9fafc;
      border: 2px solid #e2e8f0;
      border-radius: 40px;
      padding: 14px 20px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
    }
    .opt-item:hover {
      border-color: #1e5a9c;
      background: #eff6ff;
    }
    .opt-item input {
      margin-right: 12px;
      transform: scale(1.2);
    }
    .selected-correct {
      background: #dcfce7 !important;
      border-color: #15803d !important;
    }
    .selected-wrong {
      background: #fee2e2 !important;
      border-color: #b91c1c !important;
    }
    .show-correct {
      background: #e6f7e6 !important;
      border-color: #2e7d32 !important;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-top: 10px;
      margin-bottom: 20px;
    }
    button {
      padding: 12px 24px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-prev {
      background: #cbd5e1;
      color: #1e293b;
    }
    .btn-next {
      background: #1e5a9c;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .btn-submit {
      background: #dc2626;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .btn-home {
      background: white;
      border: 2px solid #cbd5e1;
      color: #1e293b;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result-box {
      background: white;
      border-radius: 32px;
      padding: 32px 20px;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    .final-score {
      font-size: 3.5rem;
      font-weight: 800;
      color: #1e5a9c;
      margin: 15px 0;
    }
    .restart-btn {
      background: #1e5a9c;
      color: white;
      padding: 12px 28px;
      margin-top: 16px;
    }
    .loading {
      text-align: center;
      padding: 50px;
      color: #475569;
      font-size: 1.1rem;
    }
    footer {
      text-align: center;
      margin: 28px 0 10px;
      font-size: 0.75rem;
      color: #475569;
    }
    @media (max-width: 550px) {
      .question-text {
        font-size: 1.1rem;
      }
      .opt-item {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
<div class="quiz-container">
  <!-- Header -->
  <div class="quiz-header">
    <h1>📝 <span id="quizTitle">लोड हो रहा है...</span></h1>
    <div class="timer" id="timer">00:00</div>
  </div>

  <!-- Dynamic Area for One-by-One Quiz -->
  <div id="dynamicArea"></div>

  <!-- Result Panel (hidden initially) -->
  <div class="result-box" id="resultPanel" style="display: none;">
    <h2>🎉 परीक्षा परिणाम</h2>
    <div class="final-score" id="scoreDisplay">0/0</div>
    <p id="negScore" style="margin-bottom: 15px; color: #ef4444; font-weight: 600;"></p>
    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <button class="btn-home" onclick="goHome()">🏠 होम</button>
      <button class="restart-btn" onclick="location.reload()">🔄 फिर से दें</button>
    </div>
  </div>

  <div id="loadingMessage" class="loading">⏳ प्रश्न लोड किए जा रहे हैं...</div>

  <footer>📌 LDC Quiz Pro | सभी प्रश्न सटीक स्रोतों पर आधारित</footer>
</div>

<script>
let questions = [];
let timer = 0;
let quizData = null;
let currentIndex = 0;
let userAnswers = [];
let submitted = false;
let interval = setInterval(() => { timer++; updateTimer(); }, 1000);

function updateTimer() {
  const m = Math.floor(timer / 60).toString().padStart(2, '0');
  const s = (timer % 60).toString().padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

function updateProgressUI() {
  const answeredCount = userAnswers.filter(a => a !== null && a !== undefined).length;
  const percent = (answeredCount / questions.length) * 100;
  const progressFill = document.querySelector(".progress-fill");
  if (progressFill) progressFill.style.width = `${percent}%`;
  const answeredSpan = document.getElementById("answeredCount");
  if (answeredSpan) answeredSpan.innerText = `${answeredCount}/${questions.length} उत्तरित`;
  const qNumSpan = document.getElementById("currentQNum");
  if (qNumSpan) qNumSpan.innerText = currentIndex + 1;
}

async function loadQuiz() {
  const saved = sessionStorage.getItem('currentQuiz');
  if (!saved) {
    document.getElementById('loadingMessage').innerHTML = "❌ कोई डेटा नहीं मिला। ldc-index.html से टेस्ट शुरू करें।";
    return;
  }

  quizData = JSON.parse(saved);
  document.getElementById('quizTitle').textContent = quizData.name;

  try {
    const res = await fetch(quizData.dataUrl);
    if (!res.ok) throw new Error("Network error");
    const data = await res.json();

    if (data.questions && Array.isArray(data.questions)) {
      questions = data.questions;
    } else if (data.record && Array.isArray(data.record)) {
      questions = data.record;
    } else if (Array.isArray(data)) {
      questions = data;
    }

    if (questions.length > 0) {
      userAnswers = new Array(questions.length).fill(null);
      document.getElementById('loadingMessage').style.display = 'none';
      renderQuestion();
    } else {
      document.getElementById('loadingMessage').innerHTML = "❌ डेटा में कोई सवाल नहीं मिला।";
    }
  } catch (e) {
    document.getElementById('loadingMessage').innerHTML = "❌ डेटा लोड करने में त्रुटि।";
    console.error("Error:", e);
  }
}

function renderQuestion() {
  const q = questions[currentIndex];
  const qText = q.q || q.question || "";
  const qOpts = q.options || q.opts || [];
  const diagram = q.diagram || q.image || q.img || null;
  const selected = userAnswers[currentIndex];
  const isAnswered = (selected !== null && selected !== undefined);

  let diagramHTML = '';
  if (diagram) {
    if (diagram.includes('<svg')) {
      diagramHTML = `<div class="diagram-container">${diagram}</div>`;
    } else {
      diagramHTML = `<div class="diagram-container"><img src="${diagram}" alt="Question Diagram"></div>`;
    }
  }

  let optionsHtml = "";
  qOpts.forEach((opt, idx) => {
    let cls = "";
    if (submitted) {
      const correctIdx = parseInt(q.correct);
      if (idx === selected && idx === correctIdx) cls = "selected-correct";
      else if (idx === selected && idx !== correctIdx) cls = "selected-wrong";
      else if (idx === correctIdx) cls = "show-correct";
    } else if (isAnswered && idx === selected) {
      cls = "opt-item-selected";
    }
    optionsHtml += `
      <label class="opt-item ${cls}" id="opt-${currentIndex}-${idx}">
        <input type="radio" name="q${currentIndex}" value="${idx}" ${isAnswered && idx === selected ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
        <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
      </label>
    `;
  });

  const dynamicDiv = document.getElementById("dynamicArea");
  const html = `
    <div class="progress-panel">
      <span class="q-counter">प्रश्न <span id="currentQNum">${currentIndex + 1}</span>/${questions.length}</span>
      <div class="progress-wrapper"><div class="progress-fill" style="width:${(userAnswers.filter(a=>a!==null&&a!==undefined).length/questions.length)*100}%"></div></div>
      <span class="answered-badge" id="answeredCount">${userAnswers.filter(a=>a!==null&&a!==undefined).length}/${questions.length} उत्तरित</span>
    </div>
    <div class="question-card">
      <div class="question-text">${currentIndex + 1}. ${qText}</div>
      ${diagramHTML}
      <div class="options-list" id="optionsList">${optionsHtml}</div>
    </div>
    <div class="nav-buttons">
      <button class="btn-prev" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>⬅ पिछला</button>
      <button class="btn-home" onclick="goHome()">🏠 बाहर निकलें</button>
      <button class="btn-next" id="nextBtn">${currentIndex === questions.length - 1 ? '✅ सबमिट करें' : 'अगला ➡'}</button>
    </div>
  `;
  dynamicDiv.innerHTML = html;

  // Event listeners for options
  if (!submitted) {
    document.querySelectorAll(".opt-item").forEach(el => {
      el.addEventListener("click", (e) => {
        if (userAnswers[currentIndex] !== null && userAnswers[currentIndex] !== undefined) return;
        const radio = el.querySelector('input');
        if (radio) {
          radio.checked = true;
          userAnswers[currentIndex] = parseInt(radio.value);
          renderQuestion();
          updateProgressUI();
        }
      });
    });
  }

  // Previous button
  document.getElementById("prevBtn")?.addEventListener("click", () => {
    if (currentIndex > 0) {
      currentIndex--;
      renderQuestion();
      updateProgressUI();
    }
  });

  // Next/Submit button
  document.getElementById("nextBtn")?.addEventListener("click", () => {
    if (currentIndex < questions.length - 1) {
      currentIndex++;
      renderQuestion();
      updateProgressUI();
    } else {
      submitQuiz();
    }
  });

  updateProgressUI();
}

function submitQuiz() {
  if (!submitted && !confirm("क्या आप वाकई टेस्ट सबमिट करना चाहते हैं?")) return;

  clearInterval(interval);
  submitted = true;
  let correctCount = 0;
  let wrongCount = 0;

  questions.forEach((q, i) => {
    const correctAns = parseInt(q.correct);
    const selected = userAnswers[i];
    if (selected !== null && selected !== undefined) {
      if (selected === correctAns) {
        correctCount++;
      } else {
        wrongCount++;
      }
    }
  });

  const total = questions.length;
  const negativeMarking = (wrongCount * 0.33).toFixed(2);

  // Re-render current question to show correct/wrong highlights
  renderQuestion();

  // Show result panel
  document.getElementById('scoreDisplay').textContent = `${correctCount}/${total}`;
  document.getElementById('negScore').textContent = `गलत उत्तर: ${wrongCount} | नेगेटिव: -${negativeMarking}`;
  document.getElementById('resultPanel').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  let completed = JSON.parse(localStorage.getItem('completedQuizzes') || '[]');
  if (!completed.includes(quizData.id)) {
    completed.push(quizData.id);
    localStorage.setItem('completedQuizzes', JSON.stringify(completed));
  }
}

function goHome() {
  window.location.href = 'ldc-index.html';
}
loadQuiz();
</script>
</body>
</html>
